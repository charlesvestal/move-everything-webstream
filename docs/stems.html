<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stem Separator</title>
<style>
  :root {
    --bg: #121212;
    --surface: #1e1e1e;
    --surface2: #2a2a2a;
    --accent: #e2b74b;
    --accent-dim: #8a6f2e;
    --text: #e0e0e0;
    --text-dim: #888;
    --radius: 8px;
    --drums: #e25555;
    --bass: #5599e2;
    --vocals: #55e299;
    --other: #c255e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }
  header { text-align: center; padding: 1rem 0; }
  header h1 { font-size: 1.8rem; color: var(--accent); letter-spacing: 0.05em; }
  header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.3rem; }

  .input-area {
    width: 100%; max-width: 700px;
    display: flex; gap: 0.5rem;
    padding: 1rem 0;
  }
  .input-area input {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid #444;
    border-radius: var(--radius);
    padding: 0.6rem 0.8rem;
    font-size: 0.95rem;
  }
  .input-area input:focus { outline: none; border-color: var(--accent); }
  .sep-btn {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius);
    padding: 0.6rem 1.5rem;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .sep-btn:hover { background: #f0c95e; }
  .sep-btn:disabled { background: var(--accent-dim); cursor: wait; }

  .progress-area {
    width: 100%; max-width: 700px;
    display: none;
  }
  .progress-area.visible { display: block; }
  .progress-label {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
    width: 0%;
  }

  .status {
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
    min-height: 1.4em;
    padding: 0.5rem 0;
  }
  .status.error { color: #e25555; }

  .stems-area {
    width: 100%; max-width: 700px;
    display: none;
    flex-direction: column;
    gap: 0.8rem;
    padding: 1rem 0;
  }
  .stems-area.visible { display: flex; }

  .stem-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 0.8rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .stem-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .stem-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stem-name {
    font-weight: 600;
    font-size: 0.95rem;
    flex: 1;
  }
  .stem-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .mute-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid #444;
    border-radius: 4px;
    padding: 0.2rem 0.5rem;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .mute-btn.muted { opacity: 0.4; }
  .vol-slider {
    width: 80px;
    accent-color: var(--accent);
  }
  .stem-audio { width: 100%; height: 36px; }

  .master-controls {
    width: 100%; max-width: 700px;
    display: none;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 0.8rem 1rem;
    gap: 0.5rem;
    align-items: center;
    justify-content: center;
  }
  .master-controls.visible { display: flex; flex-wrap: wrap; }
  .master-controls button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid #444;
    border-radius: var(--radius);
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .master-controls button:hover { border-color: var(--accent); }

  .back-link {
    color: var(--accent-dim);
    font-size: 0.8rem;
    text-decoration: none;
    margin-top: 1rem;
  }
  .back-link:hover { color: var(--accent); }

  @media (max-width: 500px) {
    .input-area { flex-direction: column; }
    .sep-btn { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Stem Separator</h1>
  <p>Separate any YouTube video into drums, bass, vocals, and other</p>
</header>

<div class="input-area">
  <input type="text" id="urlInput" placeholder="YouTube URL or video ID">
  <button class="sep-btn" id="sepBtn" onclick="startSeparation()">Separate</button>
</div>

<div class="status" id="status"></div>

<div class="progress-area" id="progressArea">
  <div class="progress-label" id="progressLabel">Loading...</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="master-controls" id="masterControls">
  <button onclick="playAllStems()">Play All</button>
  <button onclick="pauseAllStems()">Pause All</button>
  <button onclick="soloStem('vocals')">Solo Vocals</button>
  <button onclick="soloStem('drums')">Solo Drums</button>
  <button onclick="soloStem('bass')">Solo Bass</button>
  <button onclick="soloStem('other')">Solo Other</button>
  <button onclick="unmuteAll()">Unmute All</button>
</div>

<div class="stems-area" id="stemsArea">
  <div class="stem-card" id="card-drums">
    <div class="stem-header">
      <div class="stem-dot" style="background:var(--drums)"></div>
      <span class="stem-name">Drums</span>
      <div class="stem-controls">
        <button class="mute-btn" onclick="toggleMute('drums')">M</button>
        <input type="range" class="vol-slider" min="0" max="100" value="100" oninput="setVolume('drums', this.value)">
      </div>
    </div>
    <audio class="stem-audio" id="audio-drums" controls></audio>
  </div>
  <div class="stem-card" id="card-bass">
    <div class="stem-header">
      <div class="stem-dot" style="background:var(--bass)"></div>
      <span class="stem-name">Bass</span>
      <div class="stem-controls">
        <button class="mute-btn" onclick="toggleMute('bass')">M</button>
        <input type="range" class="vol-slider" min="0" max="100" value="100" oninput="setVolume('bass', this.value)">
      </div>
    </div>
    <audio class="stem-audio" id="audio-bass" controls></audio>
  </div>
  <div class="stem-card" id="card-vocals">
    <div class="stem-header">
      <div class="stem-dot" style="background:var(--vocals)"></div>
      <span class="stem-name">Vocals</span>
      <div class="stem-controls">
        <button class="mute-btn" onclick="toggleMute('vocals')">M</button>
        <input type="range" class="vol-slider" min="0" max="100" value="100" oninput="setVolume('vocals', this.value)">
      </div>
    </div>
    <audio class="stem-audio" id="audio-vocals" controls></audio>
  </div>
  <div class="stem-card" id="card-other">
    <div class="stem-header">
      <div class="stem-dot" style="background:var(--other)"></div>
      <span class="stem-name">Other</span>
      <div class="stem-controls">
        <button class="mute-btn" onclick="toggleMute('other')">M</button>
        <input type="range" class="vol-slider" min="0" max="100" value="100" oninput="setVolume('other', this.value)">
      </div>
    </div>
    <audio class="stem-audio" id="audio-other" controls></audio>
  </div>
</div>

<a class="back-link" href="cratedig.html">Back to Crate Dig</a>

<script type="module">
import * as ort from 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.all.bundle.min.mjs';

// Configure ONNX Runtime
ort.env.wasm.numThreads = navigator.hardwareConcurrency || 4;

const MODEL_URL = 'https://huggingface.co/Ryan5453/demucs-onnx/resolve/main/htdemucs.onnx';
const SAMPLE_RATE = 44100;
const STEM_NAMES = ['drums', 'bass', 'other', 'vocals'];
const SEGMENT_SAMPLES = SAMPLE_RATE * 39; // 39 seconds per segment
const OVERLAP_SAMPLES = Math.floor(SEGMENT_SAMPLES * 0.25);

const PIPED_INSTANCES = [
  'https://pipedapi.kavin.rocks',
  'https://api.piped.private.coffee',
  'https://pipedapi.adminforge.de',
  'https://pipedapi.leptons.xyz',
  'https://pipedapi.drgns.space',
];

let ortSession = null;
let stemVolumes = { drums: 1, bass: 1, vocals: 1, other: 1 };
let stemMuted = { drums: false, bass: false, vocals: false, other: false };

// --- UI helpers ---
function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

function setProgress(label, pct) {
  const area = document.getElementById('progressArea');
  area.classList.add('visible');
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressFill').style.width = pct + '%';
}

function hideProgress() {
  document.getElementById('progressArea').classList.remove('visible');
}

// --- Extract video ID ---
function extractVideoId(input) {
  input = input.trim();
  // Direct ID (11 chars)
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  // URL patterns
  const m = input.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

// --- Fetch audio via Piped ---
async function fetchAudioViaPiped(videoId) {
  for (const instance of PIPED_INSTANCES) {
    try {
      setStatus(`Trying ${instance}...`);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const res = await fetch(`${instance}/streams/${videoId}`, { signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const data = await res.json();
      if (!data.audioStreams || !data.audioStreams.length) continue;

      // Prefer opus/webm, fallback to mp4
      const streams = data.audioStreams.sort((a, b) => b.bitrate - a.bitrate);
      const best = streams.find(s => s.mimeType?.startsWith('audio/webm'))
                || streams.find(s => s.mimeType?.startsWith('audio/mp4'))
                || streams[0];

      if (!best?.url) continue;

      setStatus(`Downloading audio (${best.quality})...`);
      setProgress('Downloading audio...', 0);

      const audioRes = await fetch(best.url);
      if (!audioRes.ok) continue;

      const contentLength = parseInt(audioRes.headers.get('content-length') || '0');
      const reader = audioRes.body.getReader();
      const chunks = [];
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (contentLength > 0) {
          setProgress(`Downloading audio... (${(received / 1048576).toFixed(1)}MB)`,
            Math.round(received / contentLength * 100));
        }
      }

      const audioData = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) {
        audioData.set(chunk, offset);
        offset += chunk.length;
      }

      return { buffer: audioData.buffer, title: data.title || videoId };
    } catch (e) {
      continue;
    }
  }
  throw new Error('Could not fetch audio from any Piped instance');
}

// --- Decode audio to stereo float32 at 44100Hz ---
async function decodeAudio(arrayBuffer) {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  const decoded = await audioCtx.decodeAudioData(arrayBuffer);
  audioCtx.close();

  // Convert to stereo float32
  const length = decoded.length;
  const left = decoded.getChannelData(0);
  const right = decoded.numberOfChannels > 1 ? decoded.getChannelData(1) : left;

  return { left: new Float32Array(left), right: new Float32Array(right), length };
}

// --- Load ONNX model ---
async function loadModel() {
  if (ortSession) return ortSession;

  setProgress('Downloading model (~80MB, first time only)...', 0);
  setStatus('Downloading stem separation model...');

  // Fetch model with progress
  const res = await fetch(MODEL_URL);
  const contentLength = parseInt(res.headers.get('content-length') || '0');
  const reader = res.body.getReader();
  const chunks = [];
  let received = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    if (contentLength > 0) {
      setProgress(`Downloading model... (${(received / 1048576).toFixed(1)}MB)`,
        Math.round(received / contentLength * 100));
    }
  }

  const modelData = new Uint8Array(received);
  let offset = 0;
  for (const chunk of chunks) {
    modelData.set(chunk, offset);
    offset += chunk.length;
  }

  setProgress('Loading model into memory...', 100);
  setStatus('Initializing model (this may take a moment)...');

  // Try WebGPU first, fallback to WASM
  const providers = [];
  if (navigator.gpu) providers.push('webgpu');
  providers.push('wasm');

  ortSession = await ort.InferenceSession.create(modelData.buffer, {
    executionProviders: providers,
  });

  return ortSession;
}

// --- Run stem separation ---
async function separateStems(left, right, totalLength) {
  const session = await loadModel();

  // Determine segments
  const step = SEGMENT_SAMPLES - OVERLAP_SAMPLES;
  const numSegments = Math.ceil(totalLength / step);

  // Output buffers: 4 stems x 2 channels
  const stems = STEM_NAMES.map(() => ({
    left: new Float32Array(totalLength),
    right: new Float32Array(totalLength),
  }));
  const weights = new Float32Array(totalLength); // overlap-add weights

  for (let seg = 0; seg < numSegments; seg++) {
    const start = seg * step;
    const end = Math.min(start + SEGMENT_SAMPLES, totalLength);
    const segLen = end - start;

    setProgress(`Separating stems... (segment ${seg + 1}/${numSegments})`,
      Math.round((seg / numSegments) * 100));
    setStatus(`Processing segment ${seg + 1} of ${numSegments}...`);

    // Yield to UI
    await new Promise(r => setTimeout(r, 0));

    // Prepare input: [1, 2, segLen]
    const inputData = new Float32Array(2 * segLen);
    for (let i = 0; i < segLen; i++) {
      inputData[i] = left[start + i] || 0;
      inputData[segLen + i] = right[start + i] || 0;
    }

    const inputTensor = new ort.Tensor('float32', inputData, [1, 2, segLen]);
    const results = await session.run({ mix: inputTensor });

    // Output shape: [1, 4, 2, segLen]
    const output = results[Object.keys(results)[0]];
    const outData = output.data;

    // Build window for overlap-add (Hann)
    const window = new Float32Array(segLen);
    for (let i = 0; i < segLen; i++) {
      window[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / (segLen - 1)));
    }

    // Accumulate stems with overlap-add
    for (let s = 0; s < 4; s++) {
      for (let i = 0; i < segLen; i++) {
        const idx = start + i;
        if (idx >= totalLength) break;
        const lVal = outData[s * 2 * segLen + i];
        const rVal = outData[s * 2 * segLen + segLen + i];
        stems[s].left[idx] += lVal * window[i];
        stems[s].right[idx] += rVal * window[i];
      }
    }

    for (let i = 0; i < segLen; i++) {
      const idx = start + i;
      if (idx < totalLength) weights[idx] += window[i];
    }
  }

  // Normalize by overlap weights
  for (let i = 0; i < totalLength; i++) {
    if (weights[i] > 0) {
      for (let s = 0; s < 4; s++) {
        stems[s].left[i] /= weights[i];
        stems[s].right[i] /= weights[i];
      }
    }
  }

  return stems;
}

// --- Encode stem to WAV blob ---
function encodeWav(left, right, sampleRate) {
  const length = left.length;
  const buffer = new ArrayBuffer(44 + length * 4);
  const view = new DataView(buffer);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + length * 4, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 3, true); // IEEE float
  view.setUint16(22, 2, true); // stereo
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2 * 4, true); // byte rate
  view.setUint16(32, 8, true); // block align
  view.setUint16(34, 32, true); // bits per sample
  writeString(36, 'data');
  view.setUint32(40, length * 4, true);

  // Interleaved stereo float32
  let offset = 44;
  for (let i = 0; i < length; i++) {
    view.setFloat32(offset, left[i], true);
    offset += 4;
  }

  // Wait, stereo means we need both channels interleaved
  // Recalculate buffer size
  const buffer2 = new ArrayBuffer(44 + length * 2 * 4);
  const view2 = new DataView(buffer2);

  writeString2(view2, 0, 'RIFF');
  view2.setUint32(4, 36 + length * 2 * 4, true);
  writeString2(view2, 8, 'WAVE');
  writeString2(view2, 12, 'fmt ');
  view2.setUint32(16, 16, true);
  view2.setUint16(20, 3, true); // IEEE float
  view2.setUint16(22, 2, true); // stereo
  view2.setUint32(24, sampleRate, true);
  view2.setUint32(28, sampleRate * 2 * 4, true);
  view2.setUint16(32, 8, true);
  view2.setUint16(34, 32, true);
  writeString2(view2, 36, 'data');
  view2.setUint32(40, length * 2 * 4, true);

  let off = 44;
  for (let i = 0; i < length; i++) {
    view2.setFloat32(off, left[i], true); off += 4;
    view2.setFloat32(off, right[i], true); off += 4;
  }

  return new Blob([buffer2], { type: 'audio/wav' });

  function writeString2(dv, offset, str) {
    for (let i = 0; i < str.length; i++) dv.setUint8(offset + i, str.charCodeAt(i));
  }
}

// --- Main flow ---
window.startSeparation = async function() {
  const input = document.getElementById('urlInput').value;
  const videoId = extractVideoId(input);
  if (!videoId) {
    setStatus('Please enter a valid YouTube URL or video ID.', true);
    return;
  }

  const btn = document.getElementById('sepBtn');
  btn.disabled = true;
  btn.textContent = 'Working...';
  document.getElementById('stemsArea').classList.remove('visible');
  document.getElementById('masterControls').classList.remove('visible');

  try {
    // 1. Fetch audio
    const { buffer, title } = await fetchAudioViaPiped(videoId);

    // 2. Decode
    setStatus('Decoding audio...');
    setProgress('Decoding audio...', 0);
    const audio = await decodeAudio(buffer);
    setProgress('Decoding audio...', 100);

    // 3. Separate stems
    const stems = await separateStems(audio.left, audio.right, audio.length);

    // 4. Create audio elements
    setStatus('Encoding stems...');
    setProgress('Encoding stems...', 80);

    for (let i = 0; i < 4; i++) {
      const wav = encodeWav(stems[i].left, stems[i].right, SAMPLE_RATE);
      const url = URL.createObjectURL(wav);
      const el = document.getElementById(`audio-${STEM_NAMES[i]}`);
      el.src = url;
    }

    setProgress('Done!', 100);
    setStatus(`Separated: ${title}`);
    document.getElementById('stemsArea').classList.add('visible');
    document.getElementById('masterControls').classList.add('visible');
    hideProgress();

  } catch (err) {
    setStatus(`Error: ${err.message}`, true);
    hideProgress();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Separate';
  }
};

// --- Stem controls ---
window.setVolume = function(stem, val) {
  const el = document.getElementById(`audio-${stem}`);
  stemVolumes[stem] = val / 100;
  if (!stemMuted[stem]) el.volume = val / 100;
};

window.toggleMute = function(stem) {
  stemMuted[stem] = !stemMuted[stem];
  const el = document.getElementById(`audio-${stem}`);
  const btn = document.querySelector(`#card-${stem} .mute-btn`);
  if (stemMuted[stem]) {
    el.volume = 0;
    btn.classList.add('muted');
  } else {
    el.volume = stemVolumes[stem];
    btn.classList.remove('muted');
  }
};

window.playAllStems = function() {
  // Sync all stems to the same time as the first one
  const ref = document.getElementById('audio-drums');
  const time = ref.currentTime;
  STEM_NAMES.forEach(name => {
    const el = document.getElementById(`audio-${name}`);
    el.currentTime = time;
    el.play();
  });
};

window.pauseAllStems = function() {
  STEM_NAMES.forEach(name => {
    document.getElementById(`audio-${name}`).pause();
  });
};

window.soloStem = function(stem) {
  STEM_NAMES.forEach(name => {
    const el = document.getElementById(`audio-${name}`);
    const btn = document.querySelector(`#card-${name} .mute-btn`);
    if (name === stem) {
      stemMuted[name] = false;
      el.volume = stemVolumes[name];
      btn.classList.remove('muted');
    } else {
      stemMuted[name] = true;
      el.volume = 0;
      btn.classList.add('muted');
    }
  });
};

window.unmuteAll = function() {
  STEM_NAMES.forEach(name => {
    stemMuted[name] = false;
    const el = document.getElementById(`audio-${name}`);
    el.volume = stemVolumes[name];
    document.querySelector(`#card-${name} .mute-btn`).classList.remove('muted');
  });
};

// --- Check for videoId in URL params ---
const params = new URLSearchParams(location.search);
const vid = params.get('v') || params.get('videoId');
if (vid) {
  document.getElementById('urlInput').value = vid;
}
</script>

</body>
</html>
